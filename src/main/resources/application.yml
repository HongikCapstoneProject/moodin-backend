spring:
  application:
    name: moodin
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    #driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update  # create-drop 대신 update 사용
      show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: never

server:
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: false
        same-site: lax

fastapi:
  url: http://localhost:8000

  stress:
    combineStrategy: WORST
    hrv.sdnn:
      lowMin: 60.0
      highMin: 40.0
      riskMin: 20.0
      criticalMin: -1e9
    gsr.tonic:
      lowMax: 5.0
      highMax: 7.0
      riskMax: 10.0
      criticalMax: 1e9